version: '3.8'

services:
  backend:
    build: ../backend
    environment:
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI must be set}
      - MONGO_DB=${MONGO_DB:-ids}
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - AUTH_ALLOW_INSECURE_NO_AUTH=false
      - DEMO_LOGIN_USERNAME=${DEMO_LOGIN_USERNAME:-}
      - DEMO_LOGIN_PASSWORD=${DEMO_LOGIN_PASSWORD:-}
      - JWT_ISSUER=${JWT_ISSUER:-securecyber-ids}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-securecyber-ui}
      - JWT_EXP_SECONDS=${JWT_EXP_SECONDS:-3600}
      - ENABLE_PACKET_CAPTURE=${ENABLE_PACKET_CAPTURE:-false}
      - NETWORK_INTERFACE=${NETWORK_INTERFACE:-auto}
      - CAPTURE_FILTER=${CAPTURE_FILTER:-tcp or udp and not multicast and not broadcast}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.98}
      - ENABLE_ANOMALY_DETECTION=${ENABLE_ANOMALY_DETECTION:-true}
      - ANOMALY_SCORE_THRESHOLD=${ANOMALY_SCORE_THRESHOLD:--0.15}
      - RISK_SCORING_ENABLED=${RISK_SCORING_ENABLED:-true}
      - RISK_WEIGHT_XGBOOST=${RISK_WEIGHT_XGBOOST:-0.55}
      - RISK_WEIGHT_ANOMALY=${RISK_WEIGHT_ANOMALY:-0.30}
      - RISK_WEIGHT_DRIFT=${RISK_WEIGHT_DRIFT:-0.15}
      - RISK_MIN_COMPONENT_SCORE=${RISK_MIN_COMPONENT_SCORE:-0.5}
      - RISK_ALERT_THRESHOLD=${RISK_ALERT_THRESHOLD:-0.75}
      - RISK_ALERT_MIN_SIGNALS=${RISK_ALERT_MIN_SIGNALS:-1}
      - RISK_AUTOBLOCK_ENABLED=${RISK_AUTOBLOCK_ENABLED:-false}
      - RISK_AUTOBLOCK_THRESHOLD=${RISK_AUTOBLOCK_THRESHOLD:-0.92}
      - RISK_AUTOBLOCK_MIN_SIGNALS=${RISK_AUTOBLOCK_MIN_SIGNALS:-2}
      - RISK_AUTOBLOCK_TTL_SECONDS=${RISK_AUTOBLOCK_TTL_SECONDS:-300}
      - ALERT_FUSION_ENABLED=${ALERT_FUSION_ENABLED:-true}
      - ALERT_DEDUP_WINDOW_SECONDS=${ALERT_DEDUP_WINDOW_SECONDS:-30}
    volumes:
      - ../models:/models:ro
      - ../backend/logs:/app/logs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
