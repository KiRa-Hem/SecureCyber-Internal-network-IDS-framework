global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'enhanced-ids-ips'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    bearer_token: 'CHANGE_ME'
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:9216']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s
