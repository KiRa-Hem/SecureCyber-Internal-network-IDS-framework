version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./data/ids.db
      - USE_MONGODB=false
      - MONGODB_URI=mongodb://mongodb:27017/ids
      - MONGO_DB=ids
      - MONGO_USER=
      - MONGO_PASSWORD=
      - MONGO_CLUSTER=
      - ENABLE_REDIS=false
      - ENABLE_PACKET_CAPTURE=true
      - MODEL_PATH=/models
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - AUTH_ALLOW_INSECURE_NO_AUTH=false
      - DEMO_LOGIN_USERNAME=${DEMO_LOGIN_USERNAME:-}
      - DEMO_LOGIN_PASSWORD=${DEMO_LOGIN_PASSWORD:-}
      - JWT_ISSUER=securecyber-ids
      - JWT_AUDIENCE=securecyber-ui
      - JWT_EXP_SECONDS=3600
      - AUDIT_LOG_ENABLED=true
      - AUDIT_LOG_TO_DB=true
      - ALERT_FUSION_ENABLED=true
      - ALERT_DEDUP_WINDOW_SECONDS=30
      - DRIFT_ENABLED=true
      - ENABLE_ANOMALY_DETECTION=true
      - RISK_SCORING_ENABLED=true
      - RISK_WEIGHT_XGBOOST=${RISK_WEIGHT_XGBOOST:-0.55}
      - RISK_WEIGHT_ANOMALY=${RISK_WEIGHT_ANOMALY:-0.30}
      - RISK_WEIGHT_DRIFT=${RISK_WEIGHT_DRIFT:-0.15}
      - RISK_MIN_COMPONENT_SCORE=${RISK_MIN_COMPONENT_SCORE:-0.5}
      - RISK_ALERT_THRESHOLD=${RISK_ALERT_THRESHOLD:-0.75}
      - RISK_ALERT_MIN_SIGNALS=${RISK_ALERT_MIN_SIGNALS:-1}
      - RISK_AUTOBLOCK_ENABLED=${RISK_AUTOBLOCK_ENABLED:-false}
      - RISK_AUTOBLOCK_THRESHOLD=${RISK_AUTOBLOCK_THRESHOLD:-0.92}
      - RISK_AUTOBLOCK_MIN_SIGNALS=${RISK_AUTOBLOCK_MIN_SIGNALS:-2}
      - RISK_AUTOBLOCK_TTL_SECONDS=${RISK_AUTOBLOCK_TTL_SECONDS:-300}
      - CORS_ORIGINS=["http://localhost","http://127.0.0.1","http://localhost:80","http://127.0.0.1:80","http://localhost:5173","http://127.0.0.1:5173"]
      - CORS_ALLOW_CREDENTIALS=false
      - SECRET_KEY=your-secret-key-change-in-production
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${PROM_BEARER_TOKEN_FILE:-./monitoring/ids_bearer_token}:/etc/prometheus/ids_bearer_token:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/ids-dashboard.json
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
